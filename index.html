    <!-- Header -->
    <header class="header">
      <div>
        <h1 class="app-title" data-i18n="app.title">소셜 배터리 테스트</h1>
        <p class="app-subtitle" data-i18n="app.subtitle">Social Battery Test</p>
      </div>
      <div class="header-controls">
        <button class="icon-btn" id="theme-btn" aria-label="Toggle theme">☀️</button>
        <button class="icon-btn" id="lang-btn" aria-label="Language">🌐</button>
        <div class="lang-menu hidden" id="lang-menu">
          <button class="lang-option" data-lang="ko">🇰🇷 한국어</button>
          <button class="lang-option" data-lang="en">🇺🇸 English</button>
          <button class="lang-option" data-lang="ja">🇯🇵 日本語</button>
          <button class="lang-option" data-lang="zh">🇨🇳 中文</button>
          <button class="lang-option" data-lang="hi">🇮🇳 हिन्दी</button>
          <button class="lang-option" data-lang="ru">🇷🇺 Русский</button>
          <button class="lang-option" data-lang="es">🇪🇸 Español</button>
          <button class="lang-option" data-lang="pt">🇧🇷 Português</button>
          <button class="lang-option" data-lang="id">🇮🇩 Indonesia</button>
          <button class="lang-option" data-lang="tr">🇹🇷 Türkçe</button>
          <button class="lang-option" data-lang="de">🇩🇪 Deutsch</button>
          <button class="lang-option" data-lang="fr">🇫🇷 Français</button>
        </div>
      </div>
    </header>

    <!-- Screen: Start -->
    <section id="screen-start" class="screen active">
      <div class="start-hero">
        <span class="hero-icon">🔋</span>
        <h2 class="hero-title" data-i18n="app.heroTitle">나의 소셜 배터리는 몇 %?</h2>
        <p class="hero-subtitle" data-i18n="app.heroDesc">10개 질문으로 당신의 사회적 에너지 잔량과 유형을 알아보세요.</p>
      </div>

      <div class="info-strip">
        <div class="info-chip">📋 <span data-i18n="intro.chipQuestions">10개 질문</span></div>
        <div class="info-chip">⏱️ <span data-i18n="intro.chipTime">약 2분 소요</span></div>
        <div class="info-chip">🔋 <span data-i18n="intro.chipTypes">4가지 유형</span></div>
      </div>

      <div class="types-grid">
        <div class="type-card" data-type="solar">
          <div class="type-icon">☀️</div>
          <div class="type-name" data-i18n="intro.typeSolar">솔라 패널</div>
          <div class="type-range">76-100%</div>
        </div>
        <div class="type-card" data-type="rechargeable">
          <div class="type-icon">🔋</div>
          <div class="type-name" data-i18n="intro.typeRechargeable">충전식 배터리</div>
          <div class="type-range">51-75%</div>
        </div>
        <div class="type-card" data-type="saver">
          <div class="type-icon">🔌</div>
          <div class="type-name" data-i18n="intro.typeSaver">절전 모드</div>
          <div class="type-range">26-50%</div>
        </div>
        <div class="type-card" data-type="emergency">
          <div class="type-icon">🪫</div>
          <div class="type-name" data-i18n="intro.typeEmergency">긴급 모드</div>
          <div class="type-range">0-25%</div>
        </div>
      </div>

      <p class="disclaimer" data-i18n="intro.disclaimer">⚠️ 이 테스트는 재미를 위한 것이며 공식 심리 진단이 아닙니다.</p>
      <button class="btn btn-primary" id="btn-start" data-i18n="app.start">🔋 테스트 시작하기</button>
    </section>

    <!-- Screen: Quiz -->
    <section id="screen-quiz" class="screen">
      <div class="quiz-header">
        <div class="progress-info">
          <span class="progress-label" id="progress-label">1 / 10</span>
          <span class="progress-count" id="energy-indicator">🔋</span>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>

      <div class="question-card">
        <div class="question-number" id="q-number">Q1</div>
        <div class="question-text" id="q-text"></div>
      </div>

      <div class="options-wrap" id="options-wrap"></div>

      <div class="quiz-nav">
        <button class="btn btn-secondary" id="btn-prev" data-i18n="quiz.prev">이전</button>
        <button class="btn btn-primary" id="btn-next" data-i18n="quiz.next">다음</button>
      </div>
    </section>

    <!-- Screen: Charging (loading) -->
    <section id="screen-charging" class="screen">
      <div class="charging-screen">
        <div class="charging-battery">
          <div class="charging-fill" id="charging-fill"></div>
          <div class="charging-bolt">⚡</div>
        </div>
        <p class="charging-text" id="charging-text" data-i18n="charging.text">배터리 잔량 측정 중...</p>
      </div>
    </section>

    <!-- Screen: Result -->
    <section id="screen-result" class="screen">
      <div class="result-hero">
        <div class="battery-container">
          <div class="battery-visual">
            <div class="battery-cap" id="battery-cap"></div>
            <div class="battery-body" id="battery-body">
              <div class="battery-fill-area" id="battery-fill"></div>
              <div class="battery-bolt" id="battery-bolt">⚡</div>
            </div>
            <div class="battery-percent" id="battery-percent">0%</div>
          </div>
        </div>
        <div class="type-badge" id="type-badge"></div>
        <p class="type-desc" id="type-desc"></p>
      </div>

      <p class="section-title"><span data-i18n="result.details">상세 결과</span></p>
      <div class="detail-cards" id="detail-cards"></div>

      <p class="section-title"><span data-i18n="result.compatible">호환되는 유형</span></p>
      <div class="detail-cards" id="compatible-cards"></div>

      <div class="share-row">
        <button class="share-btn twitter" id="btn-twitter">𝕏 <span data-i18n="share.twitter">Twitter</span></button>
        <button class="share-btn" id="btn-copy"><span data-i18n="share.copyUrl">📋 링크 복사</span></button>
      </div>

      <button class="btn btn-primary" id="btn-retake" data-i18n="result.retake">🔋 다시 테스트하기</button>
    </section>
