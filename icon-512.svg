<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#0a0e1a"/>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <defs>
    <radialGradient id="bg" cx="30%" cy="30%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0a0e1a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
  </defs>
  <!-- Battery body -->
  <rect x="120" y="110" width="240" height="150" rx="24" fill="none" stroke="url(#g1)" stroke-width="12"/>
  <!-- Battery tip -->
  <rect x="360" y="155" width="32" height="64" rx="10" fill="url(#g1)"/>
  <!-- Battery fill -->
  <rect x="140" y="130" width="180" height="110" rx="10" fill="url(#g1)" opacity="0.8"/>
  <!-- Lightning bolt -->
  <polygon points="264,115 220,200 252,200 212,285 280,185 248,185" fill="#0a0e1a"/>
  <!-- Label -->
  <text x="256" y="380" font-size="56" font-weight="800" text-anchor="middle" font-family="system-ui, sans-serif" fill="url(#g1)">SOCIAL</text>
  <text x="256" y="436" font-size="46" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif" fill="url(#g1)">BATTERY</text>
</svg>
