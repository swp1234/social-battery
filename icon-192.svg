<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="40" fill="#0a0e1a"/>
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <defs>
    <radialGradient id="bg" cx="30%" cy="30%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0a0e1a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
  </defs>
  <!-- Battery body -->
  <rect x="52" y="48" width="88" height="56" rx="10" fill="none" stroke="url(#g1)" stroke-width="5"/>
  <!-- Battery tip -->
  <rect x="140" y="64" width="12" height="24" rx="4" fill="url(#g1)"/>
  <!-- Battery fill -->
  <rect x="60" y="56" width="64" height="40" rx="4" fill="url(#g1)" opacity="0.8"/>
  <!-- Lightning bolt -->
  <polygon points="100,52 86,78 96,78 84,104 106,72 96,72" fill="#0a0e1a"/>
  <!-- Label -->
  <text x="96" y="148" font-size="22" font-weight="800" text-anchor="middle" font-family="system-ui, sans-serif" fill="url(#g1)">SOCIAL</text>
  <text x="96" y="170" font-size="18" font-weight="700" text-anchor="middle" font-family="system-ui, sans-serif" fill="url(#g1)">BATTERY</text>
</svg>
